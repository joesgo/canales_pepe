name: Actualizar Lista Automáticamente

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Crear script de curado simple
        run: |
          cat > curar_lista.py << 'EOF'
import requests
import os

print("Iniciando curado automático...")

# Leer fuentes del archivo fuentes.txt
with open("fuentes.txt", "r") as f:
    fuentes = [linea.strip() for linea in f if linea.strip()]

print(f"Usando {len(fuentes)} fuentes")

# Leer la lista actual para saber qué canales buscar
try:
    with open("lista_combo.m3u", "r") as f:
        lineas_actuales = f.readlines()
except:
    lineas_actuales = []

print("Procesando canales...")
# Aquí iría la lógica de curado, pero por ahora solo probamos

print("Proceso completado")
EOF
      
      - name: Ejecutar script de curado
        run: python curar_lista.py
      
      
      - name: Subir cambios
        run: |
          git config --global user.name "joesgo"
          git config --global user.email "joesgo5559@gmail.com"
          git add lista_combo.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática $(date)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
